name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ruff ultralytics bentoml prometheus-client

      - name: Lint
        run: ruff check src/

      - name: Test export
        run: |
          python -c "from ultralytics import YOLO; model = YOLO('yolov8n.pt'); model.export(format='onnx')"